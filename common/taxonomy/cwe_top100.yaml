      - "SSRF to access cloud metadata endpoint (169.254.169.254)"
      - "SSRF through PDF generation with external URL references"
      - "SSRF via webhook URL to scan internal network"
      - "SSRF to access internal services through URL parameter"
    mitigations:
      - "Validate and sanitize all user-supplied URLs"
      - "Implement allowlist of permitted domains and IP ranges"
      - "Block requests to private/internal IP address ranges"
      - "Use network-level segmentation to limit SSRF impact"
    related_cwes: ["CWE-20", "CWE-611", "CWE-441"]

  - id: "CWE-920"
    name: "Improper Restriction of Power Consumption"
    description: "The product operates in an environment in which power is a limited resource that cannot be automatically replenished, but it does not properly restrict the amount of power consumed."
    severity: "low"
    category: "Resource Management"
    examples:
      - "Mobile app continuously using GPS draining battery"
      - "IoT device firmware running CPU at maximum without sleep states"
      - "Excessive network polling in battery-powered devices"
    mitigations:
      - "Implement power-aware scheduling and resource management"
      - "Use sleep states and low-power modes when idle"
      - "Optimize network communication patterns for power efficiency"
    related_cwes: ["CWE-400", "CWE-770", "CWE-835"]

  - id: "CWE-939"
    name: "Improper Authorization in Handler for Custom URL Scheme"
    description: "The product uses a handler for a custom URL scheme but does not properly authorize the source of the request, allowing attackers to trigger functionality through malicious links."
    severity: "medium"
    category: "Mobile Security"
    examples:
      - "Custom URI scheme handler executing actions without origin verification"
      - "Deep link exploitation to bypass in-app authentication"
      - "Intent hijacking through exported Android activities"
    mitigations:
      - "Validate the origin of custom URL scheme requests"
      - "Require user confirmation for sensitive actions triggered by custom schemes"
      - "Use Universal Links or App Links instead of custom URL schemes"
    related_cwes: ["CWE-284", "CWE-862", "CWE-346"]

  - id: "CWE-943"
    name: "Improper Neutralization of Special Elements in Data Query Logic"
    description: "The product generates a query intended to access or manipulate data in a data store such as a database, but does not properly neutralize special elements that can modify the query logic."
    severity: "high"
    category: "Injection"
    examples:
      - "NoSQL injection in MongoDB queries"
      - "LDAP injection through unfiltered search parameters"
      - "GraphQL injection through malicious query construction"
    mitigations:
      - "Use parameterized queries for all data store interactions"
      - "Apply strict input validation on all query parameters"
      - "Use ORM/ODM frameworks with built-in query sanitization"
    related_cwes: ["CWE-89", "CWE-90", "CWE-77"]

  - id: "CWE-1004"
    name: "Sensitive Cookie Without 'HttpOnly' Flag"
    description: "The product sets a sensitive cookie but does not use the HttpOnly flag, making the cookie accessible to client-side scripts and vulnerable to theft through XSS attacks."
    severity: "medium"
    category: "Session Management"
    examples:
      - "Session cookie accessible via document.cookie in JavaScript"
      - "Authentication token cookie without HttpOnly attribute"
      - "CSRF token cookie readable by injected scripts"
    mitigations:
      - "Set the HttpOnly flag on all session and authentication cookies"
      - "Set the Secure and SameSite flags as well"
      - "Use framework defaults that enable HttpOnly for session cookies"
    related_cwes: ["CWE-614", "CWE-79", "CWE-352"]

  - id: "CWE-1021"
    name: "Improper Restriction of Rendered UI Layers or Frames"
    description: "The product does not restrict or incorrectly restricts frame objects or UI layers that belong to another application or domain, enabling clickjacking attacks."
    severity: "medium"
    category: "UI Security"
    examples:
      - "Sensitive page embeddable in attacker-controlled iframe"
      - "Clickjacking to trick user into changing account settings"
      - "UI redress attack on single sign-on approval page"
    mitigations:
      - "Set X-Frame-Options header to DENY or SAMEORIGIN"
      - "Use Content-Security-Policy frame-ancestors directive"
      - "Implement JavaScript frame-busting as fallback defense"
    related_cwes: ["CWE-451", "CWE-346", "CWE-693"]

  - id: "CWE-1032"
    name: "OWASP Top Ten 2017 Category A6 - Security Misconfiguration"
    description: "Weaknesses in this category are related to the A6 category in the OWASP Top Ten 2017, covering security misconfiguration issues across the application stack."
    severity: "medium"
    category: "Security Configuration"
    examples:
      - "Default credentials left unchanged in production"
      - "Unnecessary services and ports enabled"
      - "Error handling revealing sensitive stack traces"
    mitigations:
      - "Implement automated configuration hardening"
      - "Use infrastructure as code for consistent deployments"
      - "Regularly scan for misconfiguration vulnerabilities"
    related_cwes: ["CWE-16", "CWE-276", "CWE-668"]

  - id: "CWE-1035"
    name: "OWASP Top Ten 2017 Category A9 - Using Components with Known Vulnerabilities"
    description: "Weaknesses related to the OWASP Top Ten A9 category, covering the use of components (libraries, frameworks) with known security vulnerabilities."
    severity: "high"
    category: "Supply Chain"
    examples:
      - "Using outdated jQuery version with known XSS vulnerabilities"
      - "Running unpatched Apache Struts with remote code execution flaw"
      - "Including vulnerable version of Log4j in application dependencies"
    mitigations:
      - "Maintain an inventory of all software components and versions"
      - "Implement automated dependency vulnerability scanning"
      - "Establish a process for timely patching of vulnerable components"
    related_cwes: ["CWE-1104", "CWE-829", "CWE-494"]

  - id: "CWE-1036"
    name: "OWASP Top Ten 2017 Category A9 - Using Components with Known Vulnerabilities (Detailed)"
    description: "This is a more granular categorization for weaknesses related to the use of third-party components that have known security issues documented in vulnerability databases."
    severity: "high"
    category: "Supply Chain"
    examples:
      - "Deploying applications with EOL runtime environments"
      - "Using deprecated cryptographic libraries"
      - "Third-party plugins with unpatched vulnerabilities"
    mitigations:
      - "Subscribe to security advisories for all dependencies"
      - "Implement software composition analysis (SCA) in CI/CD pipelines"
      - "Establish policies for maximum acceptable vulnerability age"
    related_cwes: ["CWE-1035", "CWE-1104", "CWE-829"]

  - id: "CWE-1104"
    name: "Use of Unmaintained Third Party Components"
    description: "The product depends on third-party components that are no longer actively maintained, meaning security vulnerabilities will not be patched by the original developers."
    severity: "medium"
    category: "Supply Chain"
    examples:
      - "Using abandoned npm packages with known vulnerabilities"
      - "Depending on archived GitHub projects for critical functionality"
      - "Using end-of-life operating system or runtime versions"
    mitigations:
      - "Monitor the maintenance status of all dependencies"
      - "Plan for migration when components approach end-of-life"
      - "Fork and maintain critical abandoned dependencies if necessary"
      - "Use software composition analysis tools to track component health"
    related_cwes: ["CWE-1035", "CWE-1036", "CWE-829"]

  - id: "CWE-1236"
    name: "Improper Neutralization of Formula Elements in a CSV File"
    description: "The product saves user-provided information into a CSV file, but it does not neutralize or incorrectly neutralizes special elements that could be interpreted as formula commands by spreadsheet applications."
    severity: "medium"
    category: "Injection"
    examples:
      - "CSV injection with =HYPERLINK() formula to exfiltrate data"
      - "DDE command injection through CSV export functionality"
      - "Formula injection in spreadsheet exports leading to command execution"
    mitigations:
      - "Prepend single quote to cell values starting with formula characters (=, +, -, @)"
      - "Sanitize all data before CSV export"
      - "Use proper CSV libraries that handle formula escaping"
    related_cwes: ["CWE-74", "CWE-77", "CWE-116"]

  - id: "CWE-1275"
    name: "Sensitive Cookie with Improper SameSite Attribute"
    description: "The product sets a sensitive cookie without properly setting the SameSite attribute, potentially allowing the cookie to be sent in cross-site requests and enabling CSRF attacks."
    severity: "medium"
    category: "Session Management"
    examples:
      - "Session cookie with SameSite=None without Secure flag"
      - "Authentication cookie without SameSite attribute in older browsers"
      - "Sensitive cookie with SameSite=Lax for state-changing GET requests"
    mitigations:
      - "Set SameSite=Strict or SameSite=Lax on sensitive cookies"
      - "Use SameSite=None only when cross-site usage is required, with Secure flag"
      - "Combine SameSite attribute with CSRF tokens for defense in depth"
    related_cwes: ["CWE-352", "CWE-614", "CWE-1004"]

  - id: "CWE-1321"
    name: "Improperly Controlled Modification of Object Prototype Attributes (Prototype Pollution)"
    description: "The product receives input from an upstream component but does not properly control modification of attributes of object prototypes, allowing an attacker to modify the behavior of all objects inheriting from the polluted prototype."
    severity: "high"
    category: "Injection"
    examples:
      - "Prototype pollution through lodash merge function"
      - "Polluting Object.prototype via JSON parsing"
      - "Prototype pollution leading to remote code execution in Node.js"
    mitigations:
      - "Use Object.create(null) for dictionary objects"
      - "Freeze Object.prototype and other critical prototypes"
      - "Validate and sanitize all keys in user-controlled objects"
      - "Use Map instead of plain objects for user-controlled data"
    related_cwes: ["CWE-913", "CWE-915", "CWE-502"]

  - id: "CWE-1333"
    name: "Inefficient Regular Expression Complexity"
    description: "The product uses a regular expression with an inefficient, possibly exponential worst-case computational complexity that allows an attacker to cause a denial of service (ReDoS)."
    severity: "high"
    category: "Resource Management"
    examples:
      - "ReDoS through nested quantifiers in email validation regex"
      - "Catastrophic backtracking in URL parsing regular expression"
      - "Exponential time regex in user input validation"
    mitigations:
      - "Use linear-time regex engines (RE2, rust regex)"
      - "Limit input length before applying regular expressions"
      - "Test regular expressions for ReDoS vulnerability with fuzzing tools"
      - "Set timeouts on regex execution"
    related_cwes: ["CWE-400", "CWE-770", "CWE-185"]

  - id: "CWE-1336"
    name: "Improper Neutralization of Special Elements Used in a Template Engine"
    description: "The product uses a template engine to insert or process externally-influenced input but does not neutralize or incorrectly neutralizes special elements that could be interpreted as template directives."
    severity: "critical"
    category: "Injection"
    examples:
      - "Server-Side Template Injection (SSTI) in Jinja2 templates"
      - "Template injection in Freemarker leading to RCE"
      - "Twig template injection allowing arbitrary code execution"
    mitigations:
      - "Never use user input directly in template strings"
      - "Use sandboxed template execution environments"
      - "Apply strict input validation before template rendering"
      - "Use logic-less template engines where possible"
    related_cwes: ["CWE-94", "CWE-77", "CWE-116"]

  - id: "CWE-1352"
    name: "OWASP Top Ten 2021 Category A04:2021 - Insecure Design"
    description: "Weaknesses related to insecure design patterns, missing or ineffective security controls, and architectural flaws that cannot be fixed by implementation changes alone."
    severity: "high"
    category: "Security Architecture"
    examples:
      - "Missing rate limiting on financially sensitive operations"
      - "Lack of defense in depth in application architecture"
      - "Business logic flaws allowing abuse of discount or reward systems"
    mitigations:
      - "Implement threat modeling during the design phase"
      - "Use secure design patterns and reference architectures"
      - "Establish and use a library of secure design patterns"
    related_cwes: ["CWE-284", "CWE-693", "CWE-840"]

  - id: "CWE-1385"
    name: "Missing Origin Validation in WebSockets"
    description: "The product uses WebSocket communication but does not properly validate the origin of the connecting client, allowing cross-site WebSocket hijacking."
    severity: "high"
    category: "Access Control"
    examples:
      - "WebSocket endpoint accepting connections from any origin"
      - "Cross-site WebSocket hijacking to steal real-time data"
      - "Malicious website establishing WebSocket connections to internal services"
    mitigations:
      - "Validate the Origin header on WebSocket handshake requests"
      - "Implement authentication tokens for WebSocket connections"
      - "Use CSRF-like protections for WebSocket connection establishment"
    related_cwes: ["CWE-346", "CWE-352", "CWE-284"]

  - id: "CWE-1386"
    name: "Insecure Operation on Windows Junction / Mount Point"
    description: "The product performs an operation on a file or directory but does not properly handle Windows junction points or mount points, allowing an attacker to redirect operations to unintended locations."
    severity: "medium"
    category: "File Handling"
    examples:
      - "Privileged file delete redirected via junction point to system files"
      - "Arbitrary file write through mount point manipulation"
      - "Antivirus scan bypass using directory junctions"
    mitigations:
      - "Check for reparse points before performing file operations"
      - "Avoid following symbolic links and junction points in privileged operations"
      - "Implement proper access checks that account for redirection"
    related_cwes: ["CWE-22", "CWE-59", "CWE-362"]

  - id: "CWE-1390"
    name: "Weak Authentication"
    description: "The product uses an authentication mechanism that is weak and does not provide adequate security to protect against unauthorized access."
    severity: "high"
    category: "Authentication"
    examples:
      - "Basic authentication over unencrypted connections"
      - "Single-factor authentication for sensitive operations"
      - "Authentication based on easily spoofed attributes like IP address"
    mitigations:
      - "Implement multi-factor authentication"
      - "Use strong authentication protocols (OAuth 2.0, OIDC)"
      - "Enforce strong password policies with breach detection"
    related_cwes: ["CWE-287", "CWE-307", "CWE-521"]

  - id: "CWE-1391"
    name: "Use of Weak Credentials"
    description: "The product uses weak credentials such as default passwords, easily guessable credentials, or credentials with insufficient entropy for authentication."
    severity: "high"
    category: "Authentication"
    examples:
      - "Default admin/admin credentials in deployed applications"
      - "Four-digit PINs for account access"
      - "Predictable temporary passwords following patterns"
    mitigations:
      - "Require strong credential creation during initial setup"
      - "Disable or force change of default credentials on first login"
      - "Implement credential strength checking against known weak passwords"
    related_cwes: ["CWE-521", "CWE-798", "CWE-1390"]

  - id: "CWE-1392"
    name: "Use of Default Credentials"
    description: "The product uses default credentials that are established during installation or manufacturing and are intended to be changed by administrators but often remain unchanged."
    severity: "critical"
    category: "Authentication"
    examples:
      - "IoT devices with factory-default passwords accessible from the internet"
      - "Database installations with unchanged default admin passwords"
      - "Network equipment with well-known default community strings"
    mitigations:
      - "Force password change on first login or during setup"
      - "Generate unique default credentials for each installation"
      - "Implement automated scanning for default credentials"
    related_cwes: ["CWE-798", "CWE-1391", "CWE-1393"]

  - id: "CWE-1393"
    name: "Use of Default Password"
    description: "The product is deployed with a default password that is intended to be changed post-installation but is the same across all installations, making it easily discoverable."
    severity: "critical"
    category: "Authentication"
    examples:
      - "Router with default password documented in manual"
      - "CMS installation with standard admin password"
      - "Industrial control system with published default credentials"
    mitigations:
      - "Require unique password creation during initial setup"
      - "Disable account access until password is changed"
      - "Generate random initial passwords unique to each deployment"
    related_cwes: ["CWE-798", "CWE-1391", "CWE-1392"]

  - id: "CWE-1394"
    name: "Use of Default Cryptographic Key"
    description: "The product uses a default cryptographic key that is the same across all installations, allowing attackers who obtain the key to decrypt or forge data across all deployments."
    severity: "critical"
    category: "Cryptography"
    examples:
      - "Shared TLS certificate private key across all product installations"
      - "Default encryption key for session tokens across instances"
      - "Firmware signing key shared across all devices of the same model"
    mitigations:
      - "Generate unique cryptographic keys during installation or first boot"
      - "Implement automated key rotation"
      - "Use hardware security modules for key generation and storage"
    related_cwes: ["CWE-321", "CWE-798", "CWE-330"]

  - id: "CWE-1395"
    name: "Dependency on Vulnerable Third-Party Component"
    description: "The product has a dependency on a third-party component that contains one or more known vulnerabilities, exposing the product to the same risks."
    severity: "high"
    category: "Supply Chain"
    examples:
      - "Application depending on Log4j version with Log4Shell vulnerability"
      - "Using OpenSSL version affected by Heartbleed"
      - "Including vulnerable version of Spring Framework"
    mitigations:
      - "Implement software composition analysis in CI/CD pipeline"
      - "Maintain a software bill of materials (SBOM)"
      - "Establish automated alerting for new vulnerabilities in dependencies"
      - "Define and enforce maximum acceptable vulnerability severity and age"
    related_cwes: ["CWE-1035", "CWE-1036", "CWE-1104"]
