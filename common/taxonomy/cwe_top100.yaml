# CWE Top 100 Most Critical Common Weakness Enumerations
# Reference: https://cwe.mitre.org/
# This taxonomy covers the 100 most critical software weakness types

items:
  - id: "CWE-20"
    name: "Improper Input Validation"
    description: "The product receives input or data, but it does not validate or incorrectly validates that the input has the properties required to process the data safely and correctly."
    severity: "high"
    category: "Input Validation"
    examples:
      - "Accepting negative values for quantity fields in e-commerce applications"
      - "Failing to validate email format before processing"
      - "Not checking length of user-supplied buffer sizes"
    mitigations:
      - "Validate all input against expected formats using allowlists"
      - "Implement server-side validation regardless of client-side checks"
      - "Use strong typing and parameterized interfaces"
    related_cwes: ["CWE-79", "CWE-89", "CWE-120"]

  - id: "CWE-22"
    name: "Improper Limitation of a Pathname to a Restricted Directory (Path Traversal)"
    description: "The product uses external input to construct a pathname intended to identify a file or directory within a restricted parent directory, but does not properly neutralize special elements that can cause the pathname to resolve outside of that directory."
    severity: "high"
    category: "File Handling"
    examples:
      - "Using ../../../etc/passwd in file download parameter"
      - "Manipulating ZIP file entries to write outside intended directory"
      - "Exploiting path traversal in file upload functionality"
    mitigations:
      - "Canonicalize paths before validation"
      - "Use chroot jails or similar sandboxing mechanisms"
      - "Validate that resolved paths remain within expected directories"
    related_cwes: ["CWE-23", "CWE-36", "CWE-73"]

  - id: "CWE-77"
    name: "Improper Neutralization of Special Elements used in a Command (Command Injection)"
    description: "The product constructs all or part of a command using externally-influenced input but does not neutralize or incorrectly neutralizes special elements that could modify the intended command."
    severity: "critical"
    category: "Injection"
    examples:
      - "Injecting shell metacharacters into system() calls"
      - "Manipulating command arguments through unsanitized user input"
      - "Chaining commands using semicolons or pipes in input fields"
    mitigations:
      - "Avoid calling OS commands directly; use library functions instead"
      - "Use parameterized command interfaces where available"
      - "Apply strict allowlist input validation"
    related_cwes: ["CWE-78", "CWE-88", "CWE-94"]

  - id: "CWE-78"
    name: "Improper Neutralization of Special Elements used in an OS Command (OS Command Injection)"
    description: "The product constructs all or part of an OS command using externally-influenced input but does not neutralize or incorrectly neutralizes special elements that could modify the intended OS command."
    severity: "critical"
    category: "Injection"
    examples:
      - "Passing user input directly to Runtime.exec() or os.system()"
      - "Injecting commands via filename parameters in image processing"
      - "Exploiting ping or traceroute utilities with injected arguments"
    mitigations:
      - "Use built-in library functions instead of OS commands"
      - "Escape all shell metacharacters in user-controlled input"
      - "Run commands with least-privilege accounts"
      - "Implement allowlist validation for command arguments"
    related_cwes: ["CWE-77", "CWE-88", "CWE-94"]

  - id: "CWE-79"
    name: "Cross-Site Scripting (XSS)"
    description: "The product does not neutralize or incorrectly neutralizes user-controllable input before it is placed in output that is used as a web page served to other users."
    severity: "high"
    category: "Injection"
    examples:
      - "Reflected XSS in search parameter"
      - "Stored XSS in user profile fields"
      - "DOM-based XSS through document.location manipulation"
      - "XSS via SVG file upload with embedded JavaScript"
    mitigations:
      - "Use output encoding appropriate for context (HTML, JavaScript, URL, CSS)"
      - "Implement Content Security Policy (CSP) headers"
      - "Use modern frameworks with automatic escaping"
      - "Sanitize HTML input with proven libraries like DOMPurify"
    related_cwes: ["CWE-80", "CWE-87", "CWE-116"]

  - id: "CWE-89"
    name: "Improper Neutralization of Special Elements used in an SQL Command (SQL Injection)"
    description: "The product constructs all or part of an SQL command using externally-influenced input but does not neutralize special elements that could modify the intended SQL command."
    severity: "critical"
    category: "Injection"
    examples:
      - "Login bypass using ' OR 1=1-- in username field"
      - "UNION-based SQL injection to extract database schema"
      - "Blind SQL injection via time-based or boolean-based techniques"
      - "Second-order SQL injection through stored data"
    mitigations:
      - "Use parameterized queries or prepared statements exclusively"
      - "Apply the principle of least privilege to database accounts"
      - "Use stored procedures with parameterized inputs"
      - "Implement input validation as defense in depth"
    related_cwes: ["CWE-20", "CWE-77", "CWE-943"]

  - id: "CWE-90"
    name: "Improper Neutralization of Special Elements used in an LDAP Query (LDAP Injection)"
    description: "The product constructs all or part of an LDAP query using externally-influenced input but does not neutralize special elements that could modify the intended LDAP query."
    severity: "high"
    category: "Injection"
    examples:
      - "Injecting LDAP filter metacharacters to bypass authentication"
      - "Modifying LDAP search queries to enumerate directory entries"
      - "Extracting sensitive attributes through crafted LDAP filters"
    mitigations:
      - "Use parameterized LDAP query interfaces"
      - "Escape special LDAP characters in user input"
      - "Validate input against strict allowlist patterns"
    related_cwes: ["CWE-77", "CWE-89", "CWE-116"]

  - id: "CWE-94"
    name: "Improper Control of Generation of Code (Code Injection)"
    description: "The product constructs all or part of a code segment using externally-influenced input but does not neutralize or incorrectly neutralizes special elements that could modify the syntax or behavior of the intended code."
    severity: "critical"
    category: "Injection"
    examples:
      - "Server-side template injection leading to remote code execution"
      - "Eval injection in dynamic language interpreters"
      - "Expression language injection in Java EE applications"
    mitigations:
      - "Avoid dynamically generating and executing code from user input"
      - "Use sandboxed execution environments"
      - "Apply strict input validation and output encoding"
      - "Use safe APIs that do not involve code generation"
    related_cwes: ["CWE-77", "CWE-78", "CWE-95", "CWE-96"]

  - id: "CWE-116"
    name: "Improper Encoding or Escaping of Output"
    description: "The product prepares a structured message for communication with another component but encoding or escaping of the data is either missing or done incorrectly, resulting in the message being interpreted differently than intended."
    severity: "high"
    category: "Injection"
    examples:
      - "Missing HTML entity encoding leading to XSS"
      - "Incorrect URL encoding causing injection in redirect targets"
      - "Failure to escape special characters in CSV export leading to formula injection"
    mitigations:
      - "Apply context-aware output encoding consistently"
      - "Use established encoding libraries rather than custom implementations"
      - "Encode data as late as possible before output"
    related_cwes: ["CWE-79", "CWE-89", "CWE-838"]

  - id: "CWE-119"
    name: "Improper Restriction of Operations within the Bounds of a Memory Buffer"
    description: "The product performs operations on a memory buffer but can read from or write to a memory location outside the intended boundary of the buffer, leading to potential code execution or crashes."
    severity: "critical"
    category: "Memory Safety"
    examples:
      - "Buffer overflow in C string handling functions"
      - "Heap overflow through oversized input in network protocol parsing"
      - "Stack buffer overflow leading to return address overwrite"
    mitigations:
      - "Use memory-safe languages where possible"
      - "Enable compiler protections (ASLR, stack canaries, DEP)"
      - "Use safe string and buffer handling functions"
      - "Implement bounds checking on all buffer operations"
    related_cwes: ["CWE-120", "CWE-125", "CWE-787"]

  - id: "CWE-120"
    name: "Buffer Copy without Checking Size of Input (Classic Buffer Overflow)"
    description: "The product copies an input buffer to an output buffer without verifying that the size of the input buffer is less than the size of the output buffer, leading to a buffer overflow."
    severity: "critical"
    category: "Memory Safety"
    examples:
      - "Using strcpy() without checking source string length"
      - "Memcpy with user-controlled length parameter"
      - "Sprintf into fixed-size buffer without length checks"
    mitigations:
      - "Use length-limited buffer copy functions (strncpy, snprintf)"
      - "Validate input length before copying"
      - "Use dynamic memory allocation sized to input"
      - "Adopt memory-safe languages for new development"
    related_cwes: ["CWE-119", "CWE-125", "CWE-787"]

  - id: "CWE-125"
    name: "Out-of-bounds Read"
    description: "The product reads data past the end, or before the beginning, of the intended buffer, potentially exposing sensitive information from adjacent memory."
    severity: "high"
    category: "Memory Safety"
    examples:
      - "Heartbleed vulnerability reading past TLS heartbeat buffer"
      - "Array index out of bounds in image parsing library"
      - "Reading uninitialized memory due to incorrect length calculations"
    mitigations:
      - "Perform bounds checking before all read operations"
      - "Use safe array access methods with bounds enforcement"
      - "Enable address sanitizers during development and testing"
    related_cwes: ["CWE-119", "CWE-120", "CWE-787"]

  - id: "CWE-134"
    name: "Use of Externally-Controlled Format String"
    description: "The product uses a function that accepts a format string as an argument, but the format string originates from an external source, allowing attackers to read or write memory."
    severity: "high"
    category: "Memory Safety"
    examples:
      - "Passing user input directly to printf() as the format string"
      - "Using syslog() with user-controlled format argument"
      - "Format string attacks through logging functions"
    mitigations:
      - "Never pass externally-controlled data as format strings"
      - "Always use constant format strings with variable arguments"
      - "Use compiler warnings for format string vulnerabilities (-Wformat-security)"
    related_cwes: ["CWE-119", "CWE-120", "CWE-787"]

  - id: "CWE-190"
    name: "Integer Overflow or Wraparound"
    description: "The product performs a calculation that can produce an integer overflow or wraparound, when the logic assumes that the resulting value will always be larger than the original value."
    severity: "high"
    category: "Numeric Errors"
    examples:
      - "Multiplying allocation size by element count causing integer overflow"
      - "Adding two large positive integers resulting in negative value"
      - "Integer overflow in financial transaction calculations"
    mitigations:
      - "Use safe integer arithmetic libraries with overflow checking"
      - "Validate numeric inputs against expected ranges before operations"
      - "Use larger integer types where overflow is possible"
      - "Enable compiler overflow detection flags"
    related_cwes: ["CWE-119", "CWE-681", "CWE-787"]

  - id: "CWE-200"
    name: "Exposure of Sensitive Information to an Unauthorized Actor"
    description: "The product exposes sensitive information to an actor that is not explicitly authorized to have access to that information, potentially through error messages, logs, or other channels."
    severity: "medium"
    category: "Information Disclosure"
    examples:
      - "Detailed error messages revealing database schema"
      - "Stack traces exposed in production web application responses"
      - "API responses including internal system paths"
      - "Source code comments containing credentials"
    mitigations:
      - "Implement generic error messages for end users"
      - "Log detailed errors server-side only"
      - "Review all output channels for sensitive data leakage"
      - "Strip debug information from production builds"
    related_cwes: ["CWE-209", "CWE-532", "CWE-538"]

  - id: "CWE-209"
    name: "Generation of Error Message Containing Sensitive Information"
    description: "The product generates an error message that includes sensitive information about its environment, users, or associated data, which could help an attacker craft further attacks."
    severity: "medium"
    category: "Information Disclosure"
    examples:
      - "SQL error messages revealing table and column names"
      - "Authentication errors disclosing whether a username exists"
      - "Path disclosure in file not found error messages"
    mitigations:
      - "Use generic error messages for all user-facing output"
      - "Map internal exceptions to safe external error codes"
      - "Implement centralized error handling with information filtering"
    related_cwes: ["CWE-200", "CWE-532", "CWE-538"]

  - id: "CWE-250"
    name: "Execution with Unnecessary Privileges"
    description: "The product performs operations using higher privileges than are necessary, which could allow an attacker who exploits a vulnerability to perform actions with those elevated privileges."
    severity: "high"
    category: "Privilege Management"
    examples:
      - "Web application running as root on the server"
      - "Service accounts with database admin privileges for basic read operations"
      - "Mobile application requesting unnecessary system permissions"
    mitigations:
      - "Apply the principle of least privilege to all processes and accounts"
      - "Drop privileges after initialization when elevated access is needed temporarily"
      - "Use separate accounts for different privilege levels"
    related_cwes: ["CWE-269", "CWE-272", "CWE-284"]

  - id: "CWE-269"
    name: "Improper Privilege Management"
    description: "The product does not properly assign, modify, track, or check privileges for an actor, creating an unintended sphere of control for that actor."
    severity: "high"
    category: "Privilege Management"
    examples:
      - "Privilege escalation through insecure sudo configuration"
      - "Role-based access control with overly permissive default roles"
      - "Failure to revoke privileges when user role changes"
    mitigations:
      - "Implement robust role-based access control with least privilege"
      - "Regularly audit and review privilege assignments"
      - "Use well-tested authorization frameworks"
    related_cwes: ["CWE-250", "CWE-284", "CWE-285"]

  - id: "CWE-276"
    name: "Incorrect Default Permissions"
    description: "During installation or configuration, the product sets permissions for an object that are more permissive than intended, allowing unintended actors to access or modify the object."
    severity: "medium"
    category: "Privilege Management"
    examples:
      - "Configuration files created with world-readable permissions containing secrets"
      - "Log directories with write access for all users"
      - "Database files with overly permissive filesystem permissions"
    mitigations:
      - "Set restrictive default permissions and relax only when necessary"
      - "Use umask to enforce restrictive file creation permissions"
      - "Regularly audit file and directory permissions"
    related_cwes: ["CWE-269", "CWE-284", "CWE-732"]

  - id: "CWE-284"
    name: "Improper Access Control"
    description: "The product does not restrict or incorrectly restricts access to a resource from an unauthorized actor, allowing unintended interactions with the system."
    severity: "high"
    category: "Access Control"
    examples:
      - "Direct object reference allowing access to other users' records"
      - "Missing access control checks on administrative API endpoints"
      - "Bypassing access controls through parameter manipulation"
    mitigations:
      - "Implement centralized access control mechanisms"
      - "Apply deny-by-default access control policies"
      - "Enforce access controls on every request server-side"
      - "Use indirect object references instead of direct database IDs"
    related_cwes: ["CWE-285", "CWE-862", "CWE-863"]

  - id: "CWE-285"
    name: "Improper Authorization"
    description: "The product does not perform or incorrectly performs an authorization check when an actor attempts to access a resource or perform an action, allowing unauthorized operations."
    severity: "high"
    category: "Access Control"
    examples:
      - "Missing authorization check on admin-only functionality"
      - "Client-side authorization enforcement only"
      - "Horizontal privilege escalation through predictable resource identifiers"
    mitigations:
      - "Enforce authorization checks server-side for every action and resource"
      - "Use a centralized authorization service or middleware"
      - "Implement and test role-based access control thoroughly"
    related_cwes: ["CWE-284", "CWE-862", "CWE-863"]

  - id: "CWE-287"
    name: "Improper Authentication"
    description: "The product does not properly verify that a claimed identity is genuine, allowing attackers to bypass authentication mechanisms or impersonate legitimate users."
    severity: "critical"
    category: "Authentication"
    examples:
      - "Authentication bypass through SQL injection in login form"
      - "Accepting empty or null passwords"
      - "Broken multi-factor authentication fallback mechanisms"
      - "Session fixation allowing account takeover"
    mitigations:
      - "Use established authentication frameworks and protocols"
      - "Implement multi-factor authentication"
      - "Use strong password hashing algorithms (bcrypt, Argon2)"
      - "Enforce account lockout policies"
    related_cwes: ["CWE-306", "CWE-307", "CWE-384"]

  - id: "CWE-295"
    name: "Improper Certificate Validation"
    description: "The product does not validate or incorrectly validates a certificate, allowing an attacker to intercept or modify encrypted communications through man-in-the-middle attacks."
    severity: "high"
    category: "Cryptography"
    examples:
      - "Disabling SSL/TLS certificate verification in production code"
      - "Not checking certificate hostname against expected server"
      - "Accepting self-signed certificates without user confirmation"
    mitigations:
      - "Always validate certificates against trusted certificate authorities"
      - "Verify certificate hostname matches expected server name"
      - "Implement certificate pinning for high-security applications"
      - "Never disable certificate validation in production"
    related_cwes: ["CWE-296", "CWE-297", "CWE-319"]

  - id: "CWE-306"
    name: "Missing Authentication for Critical Function"
    description: "The product does not perform any authentication for functionality that requires a provable user identity or consumes a significant amount of resources."
    severity: "critical"
    category: "Authentication"
    examples:
      - "Administrative interface accessible without authentication"
      - "API endpoints for sensitive operations lacking auth checks"
      - "Password reset functionality without identity verification"
    mitigations:
      - "Require authentication for all non-public functionality"
      - "Implement authentication at the framework or middleware level"
      - "Conduct thorough access control reviews during design and testing"
    related_cwes: ["CWE-287", "CWE-862", "CWE-863"]

  - id: "CWE-307"
    name: "Improper Restriction of Excessive Authentication Attempts"
    description: "The product does not implement sufficient measures to prevent multiple failed authentication attempts, enabling brute-force credential guessing attacks."
    severity: "high"
    category: "Authentication"
    examples:
      - "Login form without rate limiting allowing automated brute force"
      - "API authentication endpoint without lockout mechanism"
      - "OTP/PIN verification without attempt limits"
    mitigations:
      - "Implement progressive account lockout after failed attempts"
      - "Use rate limiting on authentication endpoints"
      - "Deploy CAPTCHA after initial failed attempts"
      - "Implement exponential backoff for repeated failures"
    related_cwes: ["CWE-287", "CWE-384", "CWE-521"]

  - id: "CWE-311"
    name: "Missing Encryption of Sensitive Data"
    description: "The product does not encrypt sensitive or critical information before storage or transmission, leaving it vulnerable to unauthorized access or interception."
    severity: "high"
    category: "Cryptography"
    examples:
      - "Storing passwords in plaintext in the database"
      - "Transmitting credit card numbers over unencrypted HTTP"
      - "Sensitive configuration data stored unencrypted on disk"
    mitigations:
      - "Encrypt all sensitive data at rest and in transit"
      - "Use TLS 1.2 or higher for all network communications"
      - "Implement proper key management practices"
      - "Hash passwords with strong algorithms like bcrypt or Argon2"
    related_cwes: ["CWE-312", "CWE-319", "CWE-326"]

  - id: "CWE-312"
    name: "Cleartext Storage of Sensitive Information"
    description: "The product stores sensitive information in cleartext within a resource that might be accessible to another control sphere, including memory, filesystem, or database."
    severity: "high"
    category: "Data Protection"
    examples:
      - "Passwords stored in plaintext in configuration files"
      - "Sensitive health data stored unencrypted in mobile app local storage"
      - "API keys stored in cleartext in environment files committed to source control"
    mitigations:
      - "Encrypt sensitive data before storage using strong encryption"
      - "Use secure credential stores and vaults"
      - "Hash passwords with salt using approved algorithms"
      - "Implement data classification and apply encryption accordingly"
    related_cwes: ["CWE-311", "CWE-319", "CWE-522"]

  - id: "CWE-319"
    name: "Cleartext Transmission of Sensitive Information"
    description: "The product transmits sensitive or security-critical data in cleartext in a communication channel that can be sniffed by unauthorized actors."
    severity: "high"
    category: "Data Protection"
    examples:
      - "Sending login credentials over HTTP instead of HTTPS"
      - "Transmitting session tokens without TLS encryption"
      - "Internal microservice communication containing PII without encryption"
    mitigations:
      - "Use TLS for all network communications containing sensitive data"
      - "Enforce HTTPS with HSTS headers"
      - "Encrypt sensitive fields within messages even over encrypted channels"
    related_cwes: ["CWE-311", "CWE-312", "CWE-523"]

  - id: "CWE-326"
    name: "Inadequate Encryption Strength"
    description: "The product stores or transmits sensitive data using an encryption scheme that is theoretically sound but not strong enough for the level of protection required."
    severity: "medium"
    category: "Cryptography"
    examples:
      - "Using DES or 3DES instead of AES-256"
      - "RSA keys shorter than 2048 bits"
      - "Using 64-bit block ciphers vulnerable to birthday attacks"
    mitigations:
      - "Use current recommended key sizes (AES-256, RSA-2048 minimum)"
      - "Follow NIST or industry guidelines for algorithm and key size selection"
      - "Plan for crypto agility to upgrade algorithms as needed"
    related_cwes: ["CWE-327", "CWE-311", "CWE-330"]

  - id: "CWE-327"
    name: "Use of a Broken or Risky Cryptographic Algorithm"
    description: "The product uses a broken or risky cryptographic algorithm or protocol that has known weaknesses, making it vulnerable to cryptographic attacks."
    severity: "high"
    category: "Cryptography"
    examples:
      - "Using MD5 for password hashing"
      - "Using SHA-1 for digital signatures"
      - "Using RC4 for stream encryption"
      - "Using ECB mode for block cipher encryption"
    mitigations:
      - "Use only approved cryptographic algorithms (AES, SHA-256+, RSA-2048+)"
      - "Use established cryptographic libraries rather than custom implementations"
      - "Regularly review and update cryptographic algorithm choices"
    related_cwes: ["CWE-326", "CWE-328", "CWE-330"]

  - id: "CWE-330"
    name: "Use of Insufficiently Random Values"
    description: "The product uses insufficiently random numbers or values in a security context that depends on unpredictable numbers, such as session tokens or cryptographic keys."
    severity: "high"
    category: "Cryptography"
    examples:
      - "Using Math.random() for generating session tokens"
      - "Seeding PRNG with predictable values like current time"
      - "Using sequential integers for password reset tokens"
    mitigations:
      - "Use cryptographically secure random number generators (CSPRNG)"
      - "Use /dev/urandom or platform-equivalent secure random sources"
      - "Never use standard pseudo-random generators for security purposes"
    related_cwes: ["CWE-326", "CWE-327", "CWE-338"]

  - id: "CWE-346"
    name: "Origin Validation Error"
    description: "The product does not properly verify that the source of data or communication is valid, allowing spoofed or unauthorized origins to interact with the system."
    severity: "high"
    category: "Access Control"
    examples:
      - "Missing CORS origin validation allowing cross-origin requests"
      - "Accepting WebSocket connections without origin checking"
      - "Processing messages without verifying sender identity"
    mitigations:
      - "Validate the origin of all incoming requests"
      - "Implement strict CORS policies"
      - "Use anti-CSRF tokens for state-changing operations"
    related_cwes: ["CWE-352", "CWE-284", "CWE-942"]

  - id: "CWE-352"
    name: "Cross-Site Request Forgery (CSRF)"
    description: "The web application does not sufficiently verify that a well-formed, valid, consistent request was intentionally provided by the user who submitted the request, allowing attackers to trick users into performing unintended actions."
    severity: "high"
    category: "Session Management"
    examples:
      - "Forged form submission changing user email address"
      - "Image tag triggering GET-based state change"
      - "CSRF attack on admin panel to create new administrator account"
    mitigations:
      - "Implement anti-CSRF tokens (synchronizer token pattern)"
      - "Use SameSite cookie attribute"
      - "Verify Origin and Referer headers"
      - "Require re-authentication for sensitive operations"
    related_cwes: ["CWE-346", "CWE-284", "CWE-613"]

  - id: "CWE-362"
    name: "Concurrent Execution Using Shared Resource with Improper Synchronization (Race Condition)"
    description: "The product contains a code sequence that can run concurrently with other code, and the code sequence requires temporary exclusive access to a shared resource, but a timing window exists where the shared resource can be modified by another code sequence."
    severity: "medium"
    category: "Concurrency"
    examples:
      - "Time-of-check time-of-use (TOCTOU) in file access"
      - "Race condition in financial transaction processing"
      - "Concurrent session manipulation leading to privilege escalation"
    mitigations:
      - "Use proper synchronization primitives (mutexes, semaphores)"
      - "Implement atomic operations for critical sections"
      - "Use database transactions with appropriate isolation levels"
    related_cwes: ["CWE-367", "CWE-662", "CWE-366"]

  - id: "CWE-377"
    name: "Insecure Temporary File"
    description: "The product creates a temporary file in a directory with insecure permissions or uses predictable names, allowing attackers to exploit race conditions or access sensitive data."
    severity: "medium"
    category: "File Handling"
    examples:
      - "Creating temp files in /tmp with predictable names"
      - "Using mktemp without proper flags for secure creation"
      - "Temporary files containing sensitive data left with world-readable permissions"
    mitigations:
      - "Use secure temporary file creation functions (mkstemp)"
      - "Set restrictive permissions on temporary files immediately"
      - "Use private temporary directories with proper permissions"
      - "Delete temporary files as soon as they are no longer needed"
    related_cwes: ["CWE-276", "CWE-362", "CWE-379"]

  - id: "CWE-384"
    name: "Session Fixation"
    description: "The product authenticates a user without properly invalidating any existing session identifier, allowing an attacker to pre-set a session and have the victim authenticate with it."
    severity: "high"
    category: "Session Management"
    examples:
      - "Attacker setting session cookie before victim logs in"
      - "Session ID not regenerated after successful authentication"
      - "Accepting session IDs from URL parameters"
    mitigations:
      - "Regenerate session identifiers upon successful authentication"
      - "Invalidate all previous sessions upon login"
      - "Never accept session IDs from URL parameters or form fields"
    related_cwes: ["CWE-287", "CWE-307", "CWE-613"]

  - id: "CWE-400"
    name: "Uncontrolled Resource Consumption"
    description: "The product does not properly control the allocation and maintenance of a limited resource, allowing an actor to influence the amount of resources consumed, leading to exhaustion of available resources."
    severity: "high"
    category: "Resource Management"
    examples:
      - "Denial of service through unbounded memory allocation"
      - "CPU exhaustion via complex regular expressions (ReDoS)"
      - "File descriptor exhaustion through unclosed connections"
      - "Disk space exhaustion through unrestricted file uploads"
    mitigations:
      - "Implement resource quotas and limits"
      - "Set timeouts on all operations that consume resources"
