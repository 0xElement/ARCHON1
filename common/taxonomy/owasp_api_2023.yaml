# OWASP API Security Top 10 2023
# Reference: https://owasp.org/API-Security/
# Security risks specific to Application Programming Interfaces

items:
  - id: "API1:2023"
    name: "Broken Object Level Authorization"
    description: "APIs tend to expose endpoints that handle object identifiers, creating a wide attack surface of object-level access control issues. Object-level authorization checks should be considered in every function that accesses a data source using an ID from the user. Attackers can exploit these endpoints by manipulating the ID of an object sent within the request to gain unauthorized access."
    severity: "critical"
    category: "Access Control"
    examples:
      - "Changing the user ID parameter in GET /api/users/123/profile to access another user's data"
      - "Modifying resource identifiers in PUT requests to update objects belonging to other users"
      - "Enumerating sequential IDs in API endpoints to discover and access unauthorized resources"
      - "Accessing other tenants' data in multi-tenant applications by manipulating tenant identifiers"
    mitigations:
      - "Implement a proper authorization mechanism that relies on user policies and hierarchy"
      - "Use the authorization mechanism to check if the logged-in user has access to the requested object"
      - "Use random and unpredictable values as GUIDs for record IDs"
      - "Write tests to evaluate the authorization mechanism and do not deploy vulnerable changes"
    related_cwes: ["CWE-284", "CWE-285", "CWE-639", "CWE-862", "CWE-863"]

  - id: "API2:2023"
    name: "Broken Authentication"
    description: "Authentication mechanisms are often implemented incorrectly, allowing attackers to compromise authentication tokens or exploit implementation flaws to assume other users' identities temporarily or permanently. APIs that do not properly protect authentication mechanisms expose critical security weaknesses."
    severity: "critical"
    category: "Authentication"
    examples:
      - "Credential stuffing attacks due to missing rate limiting on authentication endpoints"
      - "Accepting unsigned or weakly signed JWT tokens"
      - "Not validating JWT token expiration leading to indefinite session validity"
      - "Using weak API keys that are easily guessable or brute-forceable"
    mitigations:
      - "Implement standard authentication mechanisms including token generation, password storage, and multi-factor authentication"
      - "Use short-lived access tokens and implement token refresh mechanisms"
      - "Implement strict rate limiting and account lockout on authentication endpoints"
      - "Validate all authentication data including tokens, certificates, and API keys on every request"
    related_cwes: ["CWE-287", "CWE-306", "CWE-307", "CWE-384", "CWE-521"]

  - id: "API3:2023"
    name: "Broken Object Property Level Authorization"
    description: "This category combines the previous API3:2019 Excessive Data Exposure and API6:2019 Mass Assignment, focusing on the common root cause: the lack of or improper authorization validation at the object property level. This leads to information exposure or manipulation by unauthorized parties."
    severity: "high"
    category: "Access Control"
    examples:
      - "API response returning sensitive fields like SSN or password hash that the client does not need"
      - "Mass assignment attack updating user role by including isAdmin field in a profile update request"
      - "API exposing internal object properties like database IDs or internal state flags"
      - "Allowing modification of read-only properties through API requests"
    mitigations:
      - "Validate the user's permission to access specific object properties on every API response"
      - "Implement a schema-based response validation mechanism"
      - "Only return the minimum amount of data required for the business purpose"
      - "Define and enforce schemas for all API request payloads to control which properties can be modified"
    related_cwes: ["CWE-200", "CWE-213", "CWE-284", "CWE-915"]

  - id: "API4:2023"
    name: "Unrestricted Resource Consumption"
    description: "Satisfying API requests requires resources such as network bandwidth, CPU, memory, and storage. Other resources are made available by service providers via API integrations and paid on a per-request basis. APIs that do not limit resource consumption are vulnerable to denial of service and financial exhaustion attacks."
    severity: "high"
    category: "Resource Management"
    examples:
      - "Missing or improper rate limiting allowing excessive requests per second"
      - "Allowing file uploads without size limits consuming all available storage"
      - "API operations that trigger expensive backend processing without throttling"
      - "Requesting extremely large page sizes in paginated API endpoints"
    mitigations:
      - "Implement rate limiting based on business and functional requirements"
      - "Limit payload sizes and set maximum data response sizes for queries"
      - "Define and enforce maximum resource allocation for API operations"
      - "Implement server-side validation for query string and request body parameters controlling returned records"
    related_cwes: ["CWE-400", "CWE-770", "CWE-799", "CWE-920"]

  - id: "API5:2023"
    name: "Broken Function Level Authorization"
    description: "Complex access control policies with different hierarchies, groups, and roles, and an unclear separation between administrative and regular functions, tend to lead to authorization flaws. By exploiting these issues, attackers can gain access to other users' resources or administrative functions."
    severity: "critical"
    category: "Access Control"
    examples:
      - "Regular user accessing admin API endpoints by guessing the URL pattern"
      - "Changing HTTP method from GET to DELETE on a resource endpoint without proper authorization check"
      - "Accessing user management APIs reserved for administrators"
      - "Exploiting function-level authorization gaps between API versions"
    mitigations:
      - "Implement a consistent and easy-to-analyze authorization module invoked from all business functions"
      - "Deny all access by default and require explicit grants to specific roles for every function"
      - "Review API endpoints against function-level authorization flaws while keeping business logic in mind"
      - "Ensure administrative controllers inherit from an admin abstract controller that implements authorization checks"
    related_cwes: ["CWE-269", "CWE-284", "CWE-285", "CWE-862"]

  - id: "API6:2023"
    name: "Unrestricted Access to Sensitive Business Flows"
    description: "APIs vulnerable to this risk expose a business flow without compensating for the damage it would cause if the flow is used excessively in an automated way. This does not necessarily come from implementation bugs but from a lack of business logic protections. Attackers exploit the business model by automating access to business-sensitive flows."
    severity: "high"
    category: "Business Logic"
    examples:
      - "Automated purchasing of high-demand products preventing legitimate customers from buying"
      - "Mass creation of accounts or posts through automated API calls"
      - "Abusing referral or reward systems through automated flow execution"
      - "Automated reservation systems blocking all available slots"
    mitigations:
      - "Identify the business flows that might harm the business if used excessively"
      - "Choose protection mechanisms based on the business risk including device fingerprinting and human detection"
      - "Implement anti-automation controls such as CAPTCHA, rate limiting, and behavioral analysis"
      - "Consider blocking IP addresses of Tor exit nodes and known proxies for sensitive flows"
    related_cwes: ["CWE-799", "CWE-770", "CWE-841"]

  - id: "API7:2023"
    name: "Server Side Request Forgery"
    description: "Server-Side Request Forgery flaws can occur when an API fetches a remote resource without validating the user-supplied URL. This allows an attacker to coerce the application to send a crafted request to an unexpected destination, even when protected by a firewall or a VPN. Modern concepts in application development make SSRF more common and more dangerous."
    severity: "high"
    category: "Injection"
    examples:
      - "Using API URL parameters to fetch internal service data"
      - "Exploiting URL-based file import features to scan internal networks"
      - "Accessing cloud provider metadata endpoints through SSRF in API parameters"
      - "Bypassing access controls by making the server request internal-only APIs"
    mitigations:
      - "Isolate the resource fetching mechanism in your network and define clear firewall rules"
      - "Validate and sanitize all client-supplied URLs and input data"
      - "Use an allowlist of permitted remote origins, URL schemes, ports, and destination IPs"
      - "Do not send raw responses from internal requests to the API client"
    related_cwes: ["CWE-918", "CWE-20", "CWE-441"]

  - id: "API8:2023"
    name: "Security Misconfiguration"
    description: "APIs and the systems supporting them typically contain complex configurations meant to make the API more customizable. Software and DevOps engineers can miss these configurations or fail to follow security best practices, opening the door for various types of attacks across the entire API surface."
    severity: "high"
    category: "Security Configuration"
    examples:
      - "Missing or permissive CORS configuration allowing unauthorized cross-origin access"
      - "Verbose error messages exposing stack traces and internal implementation details"
      - "Unnecessary HTTP methods enabled on API endpoints"
      - "Missing TLS configuration or using outdated TLS versions"
    mitigations:
      - "Implement a repeatable hardening process leading to fast and easy deployment of properly locked-down environments"
      - "Review and update configurations across the entire API stack including orchestration, cloud services, and frameworks"
      - "Implement automated security configuration scanning in CI/CD pipelines"
      - "Ensure all API communications use encrypted channels (TLS) and restrict CORS to trusted origins"
    related_cwes: ["CWE-2", "CWE-16", "CWE-209", "CWE-319", "CWE-668"]

  - id: "API9:2023"
    name: "Improper Inventory Management"
    description: "APIs tend to expose more endpoints than traditional web applications, making proper and updated documentation highly important. A proper inventory of hosts and deployed API versions is also important to mitigate issues such as deprecated API versions and exposed debug endpoints."
    severity: "medium"
    category: "Security Architecture"
    examples:
      - "Old API versions still running in production with known vulnerabilities"
      - "Unpatched debug endpoints accessible in the production environment"
      - "Retired API endpoints still accessible and processing requests"
      - "Undocumented API endpoints bypassing API gateways and security controls"
    mitigations:
      - "Inventory all API hosts and document important aspects of each one focusing on the API environment and network access"
      - "Inventory all integrated services and document important aspects such as their role, data exchanged, and sensitivity"
      - "Document all aspects of each API version including authentication, errors, redirects, rate limiting, and CORS policy"
      - "Generate documentation automatically by adopting open standards like OpenAPI and automate the process in CI/CD"
    related_cwes: ["CWE-1059", "CWE-668", "CWE-912"]

  - id: "API10:2023"
    name: "Unsafe Consumption of APIs"
    description: "Developers tend to trust data received from third-party APIs more than user input, and so tend to adopt weaker security standards. In order to compromise APIs, attackers go after integrated third-party services instead of trying to compromise the target API directly."
    severity: "high"
    category: "Supply Chain"
    examples:
      - "Processing third-party API responses without validation leading to injection attacks"
      - "Blindly following redirects from external API responses"
      - "Not imposing resource limits when processing third-party API data"
      - "Trusting data from third-party webhooks without signature verification"
    mitigations:
      - "Evaluate the security posture of third-party API providers before integration"
      - "Validate and sanitize all data received from third-party APIs as you would user input"
      - "Implement timeouts and resource limits for all interactions with third-party services"
      - "Use allowlists for well-known redirect locations and do not blindly follow redirects"
    related_cwes: ["CWE-20", "CWE-295", "CWE-346", "CWE-502"]
