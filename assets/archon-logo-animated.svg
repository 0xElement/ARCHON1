<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" fill="none" role="img" aria-label="ARCHON — animated logo">
  <defs>
    <radialGradient id="tile" cx="50%" cy="34%" r="82%"><stop offset="0" stop-color="#1c2a42"></stop><stop offset="1" stop-color="#0a0e16"></stop></radialGradient>
    <linearGradient id="terra" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f4a784"></stop><stop offset="1" stop-color="#cf5d39"></stop></linearGradient>
    <clipPath id="tileClip"><rect x="8" y="8" width="240" height="240" rx="54"></rect></clipPath>
    <style>
      .scan { animation: archon-scan 4.2s ease-in-out infinite; }
      .ring { transform-origin: 128px 128px; animation: archon-spin 14s linear infinite; }
      .tick { transform-origin: 128px 128px; animation: archon-pulse 4.2s ease-in-out infinite; }
      .pin  { transform-origin: 128px 128px; animation: archon-pin 4.2s ease-in-out infinite; }
      @keyframes archon-scan { 0% { transform: translateX(-42px); opacity: 0; } 18% { opacity: .85; } 80% { opacity: .85; } 100% { transform: translateX(42px); opacity: 0; } }
      @keyframes archon-spin { to { transform: rotate(360deg); } }
      @keyframes archon-pulse { 0%, 60% { opacity: .85; } 72% { opacity: 1; } 100% { opacity: .85; } }
      @keyframes archon-pin { 0%, 55% { opacity: 1; } 70% { opacity: .55; } 100% { opacity: 1; } }
      @media (prefers-reduced-motion: reduce) { .scan, .ring, .tick, .pin { animation: none; } .scan { opacity: 0; } }
    </style>
  </defs>

  <rect x="8" y="8" width="240" height="240" rx="54" fill="url(#tile)"></rect>
  <rect x="8.75" y="8.75" width="238.5" height="238.5" rx="53.25" fill="none" stroke="#38bdf8" stroke-opacity=".14" stroke-width="1.5"></rect>

  <g clip-path="url(#tileClip)">
    <line class="scan" x1="128" y1="26" x2="128" y2="230" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" opacity="0"></line>
  </g>

  <circle cx="128" cy="128" r="70" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-opacity=".26"></circle>
  <circle class="ring" cx="128" cy="128" r="88" fill="none" stroke="#38bdf8" stroke-width="1.2" stroke-opacity=".18" stroke-dasharray="4 12"></circle>

  <g fill="none" stroke="url(#terra)" stroke-width="5.5" stroke-linecap="round">
    <path d="M211.8,147.3 A86,86 0 0 1 147.3,211.8"></path><path d="M108.7,211.8 A86,86 0 0 1 44.2,147.3"></path>
    <path d="M44.2,108.7 A86,86 0 0 1 108.7,44.2"></path><path d="M147.3,44.2 A86,86 0 0 1 211.8,108.7"></path>
  </g>

  <g class="tick" stroke="url(#terra)" stroke-width="6.5" stroke-linecap="round">
    <line x1="26" y1="128" x2="52" y2="128"></line><line x1="204" y1="128" x2="230" y2="128"></line><line x1="128" y1="204" x2="128" y2="230"></line>
  </g>

  <path d="M96,200 L128,52 L160,200" fill="none" stroke="url(#terra)" stroke-width="21" stroke-linejoin="miter" stroke-miterlimit="8" stroke-linecap="round"></path>
  <line x1="107" y1="150" x2="149" y2="150" stroke="url(#terra)" stroke-width="15" stroke-linecap="round"></line>

  <g class="pin">
    <circle cx="128" cy="128" r="11" fill="none" stroke="#38bdf8" stroke-width="1.8" stroke-opacity=".7"></circle>
    <circle cx="128" cy="128" r="4.8" fill="#38bdf8"></circle>
  </g>
</svg>