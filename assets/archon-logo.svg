<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="ARCHON">
  <defs>
    <radialGradient id="tile" cx="50%" cy="36%" r="82%">
      <stop offset="0" stop-color="#1c2a42"/>
      <stop offset="1" stop-color="#0a0e16"/>
    </radialGradient>
    <linearGradient id="terra" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4a784"/>
      <stop offset="1" stop-color="#cf5d39"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#38bdf8" stop-opacity="0.8"/>
      <stop offset="1"   stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- tile -->
  <rect x="8" y="8" width="240" height="240" rx="50" fill="url(#tile)"/>
  <rect x="8.75" y="8.75" width="238.5" height="238.5" rx="49.25" fill="none" stroke="#38bdf8" stroke-opacity="0.12" stroke-width="1.5"/>

  <!-- scan beam through target center -->
  <line x1="40" y1="128" x2="216" y2="128" stroke="url(#scan)" stroke-width="3" stroke-linecap="round"/>

  <!-- faint inner ring -->
  <circle cx="128" cy="128" r="70" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.28"/>

  <!-- broken targeting ring (gaps at the 4 cardinals) -->
  <g fill="none" stroke="url(#terra)" stroke-width="5" stroke-linecap="round">
    <path d="M211.8,147.3 A86,86 0 0 1 147.3,211.8"/>
    <path d="M108.7,211.8 A86,86 0 0 1 44.2,147.3"/>
    <path d="M44.2,108.7  A86,86 0 0 1 108.7,44.2"/>
    <path d="M147.3,44.2  A86,86 0 0 1 211.8,108.7"/>
  </g>

  <!-- crosshair ticks (left / right / bottom — the A serves as the top axis) -->
  <g stroke="url(#terra)" stroke-width="6" stroke-linecap="round">
    <line x1="28"  y1="128" x2="52"  y2="128"/>
    <line x1="204" y1="128" x2="228" y2="128"/>
    <line x1="128" y1="204" x2="128" y2="228"/>
  </g>

  <!-- the A — chevron needle + crossbar -->
  <path d="M96,200 L128,52 L160,200" fill="none" stroke="url(#terra)" stroke-width="20"
        stroke-linejoin="miter" stroke-miterlimit="8" stroke-linecap="round"/>
  <line x1="108" y1="150" x2="148" y2="150" stroke="url(#terra)" stroke-width="15" stroke-linecap="round"/>

  <!-- locked-target pinpoint in the heart of the A -->
  <circle cx="128" cy="128" r="11" fill="none" stroke="#38bdf8" stroke-width="1.6" stroke-opacity="0.7"/>
  <circle cx="128" cy="128" r="4.6" fill="#38bdf8"/>
</svg>
