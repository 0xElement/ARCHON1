# ARCHON — containerized run. Two services share one image + one data volume.
#
# ── HOW LOGIN WORKS (read this) ───────────────────────────────────────────────
# ARCHON authenticates with your **Claude subscription via OAuth — NO API key**.
# The image already bundles the Claude CLI (inside @anthropic-ai/claude-agent-sdk),
# so you do NOT install or mount a binary. What the container needs is YOUR LOGIN.
#
# Pick the path for your host OS:
#   • macOS / Windows (the usual case): your interactive login lives in the OS
#     Keychain/Credential-Manager, which CANNOT be mounted into a Linux container.
#     Generate a long-lived SUBSCRIPTION token on the host and pass it in:
#         claude setup-token                      # prints a CLAUDE_CODE_OAUTH_TOKEN
#         export CLAUDE_CODE_OAUTH_TOKEN=...       # then `docker compose up`
#     The daemon forwards it to the agents (still subscription auth, NOT an API key).
#   • Linux host: the login is a file at ~/.claude/.credentials.json, so the
#     ~/.claude mount below carries it directly — no token needed.
# Either way: NO ANTHROPIC_API_KEY is set or required. The ~/.claude mount is
# read-write so the CLI can refresh tokens during long runs.
#
# All Autonomous-OS flags default OFF (the image == the current product). Opt a
# block into shadow with ARCHON_ENABLE_AUTONOMOUS_OS=1 + ARCHON_ENABLE_<BLOCK>=1
# (and ARCHON_DRIVE_<BLOCK>=1 for active).
services:
  daemon:
    build: .
    image: archon:latest
    command: ["node", "event-bus.js"]
    environment:
      KURU_AGENTS_ROOT: /app
      KURU_INTEL_ROOT: /app/var/intel
      ARCHON_ENABLE_AUTONOMOUS_OS: "false"          # master kill-switch (off = current product)
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}   # macOS/Windows: `claude setup-token` (subscription, no API key)
    volumes:
      - ./var/intel:/app/var/intel                  # the single data layer
      - ${HOME}/.claude:/root/.claude               # Linux host: carries the login file; macOS/Windows: settings only
    # The image HEALTHCHECK probes HTTP (it's for the dashboard); the daemon serves
    # no HTTP, so probe its process liveness instead — else it shows a false "unhealthy".
    healthcheck:
      test: ["CMD", "node", "-e", "process.kill(1,0)"]   # PID 1 = the daemon; throws if it's gone
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  dashboard:
    image: archon:latest
    depends_on:
      - daemon
    command: ["node", "scripts/dashboard.js"]
    environment:
      KURU_AGENTS_ROOT: /app
      KURU_INTEL_ROOT: /app/var/intel
      PORT: "4000"
      DASHBOARD_HOST: "0.0.0.0"                      # bind all interfaces INSIDE the container…
    ports:
      - "127.0.0.1:4000:4000"                        # …but expose only to the host's localhost
    volumes:
      - ./var/intel:/app/var/intel
    restart: unless-stopped
